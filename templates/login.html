{% extends "base.html" %}
{% block title %}Login{% endblock %}

{% block extra_css %}
<style>
    .login-wrap { max-width: 420px; margin: 80px auto; padding: 0 24px; }
    .login-card { background: #111; border: 1px solid #1e1e1e; border-radius: 12px; padding: 40px; border-top: 3px solid #DE5A14; }
    .error-box { background: rgba(222,90,20,.08); border: 1px solid rgba(222,90,20,.2); border-radius: 6px; padding: 12px 16px; margin-bottom: 20px; font-size: 13px; color: #DE5A14; font-weight: 600; }
    .flabel { font-size: 11px; font-weight: 700; color: #666; margin-bottom: 6px; display: block; margin-top: 20px; letter-spacing: 1px; text-transform: uppercase; }
    .finput { width: 100%; padding: 12px 16px; border-radius: 8px; border: 1px solid #1e1e1e; font-size: 13px; font-family: inherit; background: #0d0d0d; color: #F9F6F6; }
    .finput:focus { outline: none; border-color: #DE5A14; }
    .pbtn { margin-top: 24px; width: 100%; background: #DE5A14; color: #F9F6F6; border: none; padding: 13px; border-radius: 6px; font-size: 14px; font-weight: 800; cursor: pointer; letter-spacing: .5px; }
    .pbtn:hover { opacity: .88; }
</style>
{% endblock %}

{% block content %}
<div class="login-wrap">
    <div class="sec-label" style="text-align: center; margin-bottom: 8px;">Welcome back</div>
    <div class="login-card">
        {% if error %}
            <div class="error-box">{{ error }}</div>
        {% endif %}
        <form method="POST">
            <label class="flabel">Username</label>
            <input class="finput" type="text" name="username" placeholder="Enter your username" required>
            <label class="flabel">Password</label>
            <input class="finput" type="password" name="password" placeholder="Enter your password" required>
            <button class="pbtn" type="submit">Log in</button>
        </form>
    </div>
</div>
{% endblock %}
